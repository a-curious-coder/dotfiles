# Window Rules - compatibility-first `windowrulev2` syntax
# Goal: work across older/newer Hyprland versions and package variants.
#
# When a rule does not match on a device, inspect classes/titles with:
#   hyprctl clients -j | jq -r '.[] | "\(.class) :: \(.title)"'

# ============================================================================
# WORKSPACE ASSIGNMENTS
# ============================================================================

# Browsers -> workspace 1
windowrulev2 = workspace 1,class:^([Ff]irefox|org\.mozilla\.firefox|[Ff]irefox-esr)$
windowrulev2 = workspace 1,class:^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
windowrulev2 = workspace 1,class:^(chrome-.+-Default)$
windowrulev2 = workspace 1,class:^([Cc]hromium)$
windowrulev2 = workspace 1,class:^([Bb]rave-browser(-beta|-dev|-unstable)?)$
windowrulev2 = workspace 1,class:^(zen-alpha|zen)$

# Terminals -> workspace 2
windowrulev2 = workspace 2,class:^(Alacritty|kitty|foot)$
windowrulev2 = workspace 2,class:^(com\.mitchellh\.ghostty)$

# Notes + capture
windowrulev2 = workspace 4,class:^(obsidian)$
windowrulev2 = workspace 4 silent,class:^(com\.obsproject\.Studio)$

# Games + launchers
windowrulev2 = workspace 5,class:^([Ss]team)$
windowrulev2 = workspace 5,title:^([Ll]utris)$
windowrulev2 = workspace 5,class:^(com\.heroicgameslauncher\.hgl)$
windowrulev2 = workspace 8,class:^(gamescope)$
windowrulev2 = workspace 8,class:^(steam_app_.*)$

# Utility workspaces
windowrulev2 = workspace 6 silent,class:^(\.?virt-manager)$
windowrulev2 = workspace 7,class:^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$
windowrulev2 = workspace 7,class:^([Ff]erdium)$
windowrulev2 = workspace 7,class:^(org\.telegram\.desktop)$
windowrulev2 = workspace 7,class:^(teams-for-linux)$
windowrulev2 = workspace 7,class:^([Ww]hatsapp-for-linux|ZapZap)$
windowrulev2 = workspace 9 silent,class:^([Aa]udacious)$

# ============================================================================
# FLOATING / DIALOGS
# ============================================================================

# Settings + utility windows
windowrulev2 = float,class:^(pavucontrol|org\.pulseaudio\.pavucontrol)$
windowrulev2 = float,class:^(nm-connection-editor|blueman-manager)$
windowrulev2 = float,class:^(file-roller|org\.gnome\.FileRoller)$
windowrulev2 = float,class:^(qt5ct|qt6ct)$
windowrulev2 = float,class:^([Rr]ofi)$
windowrulev2 = float,class:^(gnome-system-monitor|org\.gnome\.SystemMonitor)$
windowrulev2 = float,class:^(evince)$
windowrulev2 = float,class:^(eog|org\.gnome\.Loupe)$
windowrulev2 = float,class:^([Qq]alculate-gtk|org\.gnome\.Calculator)$
windowrulev2 = float,class:^([Ff]erdium)$
windowrulev2 = float,class:^(mpv|com\.github\.rafostar\.Clapper)$
windowrulev2 = float,class:^([Zz]oom|onedriver)$

# Size/center for utility windows
windowrulev2 = size 70% 70%,class:^(pavucontrol|org\.pulseaudio\.pavucontrol|nm-connection-editor|blueman-manager|file-roller|org\.gnome\.FileRoller|qt5ct|qt6ct|gnome-system-monitor|org\.gnome\.SystemMonitor|evince|eog|org\.gnome\.Loupe)$
windowrulev2 = center,class:^(pavucontrol|org\.pulseaudio\.pavucontrol|nm-connection-editor|blueman-manager|file-roller|org\.gnome\.FileRoller|qt5ct|qt6ct|gnome-system-monitor|org\.gnome\.SystemMonitor|evince|eog|org\.gnome\.Loupe)$
windowrulev2 = size 60% 70%,class:^([Ww]hatsapp-for-linux|ZapZap)$
windowrulev2 = size 60% 70%,class:^([Ff]erdium)$

# Common dialogs
windowrulev2 = float,title:^(Authentication Required)$
windowrulev2 = center,title:^(Authentication Required)$

windowrulev2 = float,title:^(Save As)$
windowrulev2 = size 70% 60%,title:^(Save As)$
windowrulev2 = center,title:^(Save As)$

windowrulev2 = float,title:^(Add Folder to Workspace)$
windowrulev2 = size 70% 60%,title:^(Add Folder to Workspace)$
windowrulev2 = center,title:^(Add Folder to Workspace)$

windowrulev2 = float,title:^(Open Files)$
windowrulev2 = size 70% 60%,title:^(Open Files)$

# ============================================================================
# PICTURE-IN-PICTURE
# ============================================================================

windowrulev2 = float,title:^(Picture-in-Picture)$
windowrulev2 = pin,title:^(Picture-in-Picture)$
windowrulev2 = keepaspectratio,title:^(Picture-in-Picture)$
windowrulev2 = move 72% 7%,title:^(Picture-in-Picture)$

# ============================================================================
# GAMES / VIDEO / IDLE
# ============================================================================

windowrulev2 = fullscreen,class:^(gamescope|steam_app_.*)$
windowrulev2 = noblur,class:^(gamescope|steam_app_.*)$
windowrulev2 = opacity 1.0 1.0,class:^([Mm]pv|vlc)$
windowrulev2 = noblur,class:^([Mm]pv|vlc)$
windowrulev2 = idleinhibit fullscreen,fullscreen:1

# ============================================================================
# LAYER RULES
# ============================================================================

layerrule = ignorealpha 1, rofi
layerrule = ignorealpha 1, notifications
layerrule = ignorealpha 0.5, quickshell:overview
