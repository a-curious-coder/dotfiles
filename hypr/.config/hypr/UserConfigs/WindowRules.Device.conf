# Per-device overrides for window rules.
# Loaded after WindowRules.conf from hyprland.conf.
#
# Keep shared/cross-device rules in:
#   ~/.config/hypr/UserConfigs/WindowRules.conf
#
# Put machine-specific class/title differences below, for example:
#
# windowrulev2 = workspace 1,class:^(zen-browser)$
# windowrulev2 = workspace 7,class:^(discord-canary)$
# windowrulev2 = float,class:^(org\.pwmt\.zathura)$

