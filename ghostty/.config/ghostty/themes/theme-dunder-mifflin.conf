# Dunder Mifflin Theme — Light (The Office US)
# The authentic bright Office look: Office Beige paper background, dark
# typewriter ink, Dunder Mifflin navy (#17459D) as the accent. The pale show
# hues (Scranton Yellow, Limestoned green) and the greys are darkened here so
# every colour stays legible on a light background.

# Background and foreground
background = #e8e1d0
foreground = #26231c

# Cursor colors
cursor-color = #17459d
cursor-text = #e8e1d0

# Selection colors
selection-background = #c9d2de
selection-foreground = #26231c

# Normal colors
palette = 0=#2b271f
palette = 1=#a5302a
palette = 2=#4f6b37
palette = 3=#86680c
palette = 4=#16407d
palette = 5=#8e4276
palette = 6=#175e68
palette = 7=#8c8270

# Bright colors
palette = 8=#5f5748
palette = 9=#b23a30
palette = 10=#5c7a40
palette = 11=#967611
palette = 12=#205395
palette = 13=#9e4e84
palette = 14=#24757c
palette = 15=#efe9db
