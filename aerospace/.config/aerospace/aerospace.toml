# --- 1. GLOBAL SETTINGS ---
start-at-login = true
after-login-command = []
after-startup-command = [
  'exec-and-forget ~/.config/aerospace/scripts/start-auto-split-watcher.sh',
]

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['exec-and-forget ~/.config/aerospace/scripts/on-focus-layout-sync.sh']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = [
  { monitor."built-in" = 0 },
  { monitor."dell" = 26 },
  26
]
outer.right = 0

# --- 2. BINDINGS ---
[mode.main.binding]

# App and window lifecycle
cmd-enter = 'exec-and-forget ~/.config/aerospace/scripts/open-ghostty-dwindle.sh'
cmd-shift-enter = 'exec-and-forget ~/.config/aerospace/scripts/toggle-dropdown-terminal.sh'
cmd-shift-w = 'close'

# Layout
cmd-shift-f = 'fullscreen'
cmd-ctrl-f = 'macos-native-fullscreen'
cmd-slash = 'layout tiles horizontal vertical'
cmd-shift-i = 'exec-and-forget ~/.config/aerospace/scripts/reorganize-workspace.sh'

# Focus
cmd-h = 'focus --boundaries all-monitors-outer-frame left'
cmd-j = 'focus --boundaries all-monitors-outer-frame down'
cmd-k = 'focus --boundaries all-monitors-outer-frame up'
cmd-l = 'focus --boundaries all-monitors-outer-frame right'
cmd-left = 'focus --boundaries all-monitors-outer-frame left'
cmd-down = 'focus --boundaries all-monitors-outer-frame down'
cmd-up = 'focus --boundaries all-monitors-outer-frame up'
cmd-right = 'focus --boundaries all-monitors-outer-frame right'

# Move and resize
cmd-ctrl-h = 'move left'
cmd-ctrl-j = 'move down'
cmd-ctrl-k = 'move up'
cmd-ctrl-l = 'move right'

cmd-shift-left = 'resize width -50'
cmd-shift-down = 'resize height +50'
cmd-shift-up = 'resize height -50'
cmd-shift-right = 'resize width +50'

# Workspace navigation
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'
cmd-e = 'workspace E'
cmd-0 = 'workspace S'

cmd-comma = 'workspace --wrap-around prev'
cmd-period = 'workspace --wrap-around next'
cmd-backslash = 'workspace-back-and-forth'

# Move window to workspace (focus follows window)
cmd-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
cmd-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
cmd-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
cmd-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
cmd-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
cmd-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
cmd-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
cmd-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
cmd-shift-9 = 'move-node-to-workspace --focus-follows-window 9'
cmd-shift-e = 'move-node-to-workspace --focus-follows-window E'
cmd-shift-0 = 'move-node-to-workspace --focus-follows-window S'

cmd-shift-comma = 'move-node-to-workspace --focus-follows-window --wrap-around prev'
cmd-shift-period = 'move-node-to-workspace --focus-follows-window --wrap-around next'

# Monitor and window cycling
cmd-alt-m = 'move-workspace-to-monitor --wrap-around next'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
alt-tab = 'move-workspace-to-monitor --wrap-around prev'
cmd-backtick = 'exec-and-forget ~/.config/aerospace/scripts/cycle-app-windows.sh'
cmd-shift-backtick = 'exec-and-forget ~/.config/aerospace/scripts/cycle-app-windows.sh prev'

# Scratchpad
cmd-u = 'exec-and-forget ~/.config/aerospace/scripts/toggle-scratchpad-workspace.sh'
cmd-shift-u = 'exec-and-forget ~/.config/aerospace/scripts/move-focused-to-scratchpad.sh'

# Config
cmd-shift-r = ['reload-config', 'exec-and-forget ~/.config/aerospace/scripts/start-auto-split-watcher.sh']

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace E'
