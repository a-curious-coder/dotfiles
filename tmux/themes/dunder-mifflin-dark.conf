# Dunder Mifflin — The Office (US) tmux theme — Dark (after hours)
# Office Beige (#D3C6B4) text on dark Dunder Mifflin navy, DM Blue (#4B8BBE)
# + Scranton Yellow (#F6EB61) accents.
# Source this instead of dunder-mifflin.conf in .tmux.conf to use dark.

dm_bg='#0F1826'        # dark Dunder Mifflin navy (background)
dm_bg_2='#16233A'      # panels / message bg
dm_ui='#223651'        # subtle ui / inactive
dm_ui_2='#33445C'      # borders
dm_tx='#D3C6B4'        # Office Beige (paper) text
dm_tx_muted='#9A907C'  # muted beige
dm_tx_faint='#5E5A50'  # faint
dm_blue='#4B8BBE'      # Dunder Mifflin Blue (accent)
dm_yellow='#F6EB61'    # Scranton Yellow

set -g status-left-length 40

# Panes, messages, copy-mode
set -g pane-border-style "fg=${dm_ui_2}"
set -g pane-active-border-style "fg=${dm_blue},bg=default"
set -g message-style "fg=${dm_tx},bg=${dm_bg_2}"
set -g message-command-style "fg=${dm_bg},bg=${dm_yellow}"
set -g mode-style "fg=${dm_tx},bg=${dm_ui}"

# Plugin colors (set before tpm's `run` so they take effect)
set -g @matryoshka_inactive_status_style "bg=${dm_ui},fg=${dm_tx_muted}"
set -g @thumbs-bg-color "${dm_bg}"
set -g @thumbs-fg-color "${dm_tx}"
set -g @thumbs-hint-fg-color "${dm_yellow}"

# Status line — a little corporate letterhead: [ DM ] session on the left.
set -g status-style "fg=${dm_tx},bg=${dm_bg}"
set -g status-left "#[fg=${dm_tx},bg=${dm_blue},bold] DM #[fg=${dm_blue},bg=${dm_bg},bold] #S "
set -g status-right "#[fg=${dm_tx_faint}]#{?client_prefix,PREFIX ,}#{?pane_in_mode,COPY ,}#{?window_zoomed_flag,ZOOM ,}#[fg=${dm_tx_muted}]#{pane_current_path} #[fg=${dm_tx}]%H:%M "
set -g window-status-separator " "
set -g window-status-format "#[fg=${dm_tx_faint}] #I:#W "
set -g window-status-current-format "#[fg=${dm_bg},bg=${dm_blue},bold] #I:#W "
set -g window-style "fg=${dm_tx_muted},bg=default"
set -g window-active-style "fg=${dm_tx},bg=default"
