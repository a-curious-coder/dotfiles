# Dunder Mifflin — The Office (US) tmux theme — Light (office paper)
# The authentic bright Office look: Office Beige paper, dark typewriter ink,
# Dunder Mifflin navy (#17459D) accent. Scranton Yellow darkened for legibility.
# Sourced near the end of .tmux.conf so it overrides the inline Flexoki styling;
# swap the source-file line to dunder-mifflin-dark.conf for the dark variant,
# or comment it out to fall back to Flexoki.

dm_bg='#E8E1D0'        # office paper (background)
dm_bg_2='#DDD3BE'      # status bar / panels (slightly darker paper)
dm_ui='#CDBF9F'        # subtle ui / inactive
dm_ui_2='#BBAD8C'      # borders
dm_tx='#26231C'        # typewriter ink (text)
dm_tx_muted='#5F5748'  # muted ink (darkened for legibility on paper)
dm_tx_faint='#837A64'  # faint (darkened so inactive tabs stay readable)
dm_blue='#17459D'      # Dunder Mifflin navy (accent)
dm_paper='#EFE9DB'     # light text on the navy badge
dm_yellow='#86680C'    # Scranton Yellow, darkened for light bg

set -g status-left-length 40

# Panes, messages, copy-mode
set -g pane-border-style "fg=${dm_ui_2}"
set -g pane-active-border-style "fg=${dm_blue},bg=default"
set -g message-style "fg=${dm_tx},bg=${dm_bg_2}"
set -g message-command-style "fg=${dm_paper},bg=${dm_blue}"
set -g mode-style "fg=${dm_tx},bg=${dm_ui}"

# Plugin colors (set before tpm's `run` so they take effect)
set -g @matryoshka_inactive_status_style "bg=${dm_ui},fg=${dm_tx_muted}"
set -g @thumbs-bg-color "${dm_bg}"
set -g @thumbs-fg-color "${dm_tx}"
set -g @thumbs-hint-fg-color "${dm_blue}"

# Status line — a little corporate letterhead: [ DM ] session on the left.
set -g status-style "fg=${dm_tx},bg=${dm_bg_2}"
set -g status-left "#[fg=${dm_paper},bg=${dm_blue},bold] DM #[fg=${dm_blue},bg=${dm_bg_2},bold] #S "
set -g status-right "#[fg=${dm_tx_faint}]#{?client_prefix,PREFIX ,}#{?pane_in_mode,COPY ,}#{?window_zoomed_flag,ZOOM ,}#[fg=${dm_tx_muted}]#{pane_current_path} #[fg=${dm_tx}]%H:%M "
set -g window-status-separator " "
set -g window-status-format "#[fg=${dm_tx_faint}] #I:#W "
set -g window-status-current-format "#[fg=${dm_paper},bg=${dm_blue},bold] #I:#W "
set -g window-style "fg=${dm_tx_muted},bg=default"
set -g window-active-style "fg=${dm_tx},bg=default"
